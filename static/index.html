<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Center Free Wi-Fi</title>
    <style>
        /* Basic Reset & Body Styling */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7fafc;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Main Card */
        .card {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 24rem; /* 384px */
            text-align: center;
        }

        /* Icon */
        .icon {
            width: 4rem; /* 64px */
            height: 4rem;
            margin: 0 auto 1rem;
            color: #2563eb; /* blue-600 */
        }

        /* Typography */
        h1 {
            font-size: 1.5rem; /* 24px */
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.875rem; /* 14px */
        }

        /* Divider */
        hr {
            border: 0;
            height: 1px;
            background-color: #e5e7eb;
            margin: 1.5rem 0;
        }

        /* Buttons & Links */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            flex-direction: column;
            margin-bottom: 1rem;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .btn-primary .text-lg {
            font-size: 1.125rem; /* 18px */
        }
        .btn-primary .text-xs {
            font-size: 0.75rem; /* 12px */
            font-weight: 400;
            opacity: 0.8;
            margin-top: 0.25rem;
        }

        .btn-guest {
            color: #6b7280;
            font-size: 0.875rem;
            gap: 0.5rem;
        }
        .btn-guest:hover {
            color: #1f2937;
        }
        .btn-guest svg {
            width: 1rem;
            height: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Official looking icon -->
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
        </svg>

        <h1>City Center Free Wi-Fi</h1>
        <p class="subtitle">Welcome! Please choose your connection tier to access the internet.</p>

        <!-- Action A: Premium -->
        <a href="/static/premium.html" class="btn btn-primary">
            <span class="text-lg">Premium High-Speed</span>
            <span class="text-xs">Login with Google</span>
        </a>

        <hr>

        <!-- Action B: Guest -->
        <a href="/static/login_success.html" class="btn btn-guest">
            Continue as Guest (1 Mbps limit)
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
        </a>
    </div>
</body>
</html>
