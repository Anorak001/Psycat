<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Center Free Wi-Fi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm text-center mx-4">
        <!-- Official looking icon -->
        <svg class="w-16 h-16 mx-auto mb-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
        </svg>

        <h1 class="text-2xl font-extrabold text-gray-800 mb-2">City Center Free Wi-Fi</h1>
        <p class="text-gray-500 mb-8 text-sm">Welcome! Please choose your connection tier to access the internet.</p>

        <!-- Action A: Premium -->
        <a href="/static/premium.html" class="flex flex-col items-center justify-center w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg mb-4 transition duration-200 shadow hover:shadow-md">
            <span class="text-lg">Premium High-Speed</span>
            <span class="text-xs font-normal opacity-80 mt-1">Login with Google</span>
        </a>

        <hr class="my-6 border-gray-200">

        <!-- Action B: Guest -->
        <button id="guestBtn" class="w-full text-gray-500 hover:text-gray-800 font-medium py-2 px-4 rounded transition duration-200 text-sm flex justify-center items-center gap-2">
            Continue as Guest (1 Mbps limit)
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
        </button>
        <p id="loadingMsg" class="hidden text-xs text-blue-500 mt-2">Connecting...</p>
    </div>

    <script>
        document.getElementById('guestBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('guestBtn');
            const msg = document.getElementById('loadingMsg');
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            msg.classList.remove('hidden');

            try {
                // Post to the backend route to trigger routing/throttling
                const response = await fetch('/api/auth/guest', {
                    method: 'POST'
                });
                
                if (response.ok) {
                    // Redirect to the Wall of Sheep dashboard
                    window.location.href = '/static/dashboard.html';
                } else {
                    alert("Failed to connect. Please try again.");
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                    msg.classList.add('hidden');
                }
            } catch (error) {
                console.error("Error connecting:", error);
                // For demo purposes, if API is down, redirect anyway
                window.location.href = '/static/dashboard.html';
            }
        });
    </script>
</body>
</html>
