<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall of Sheep - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* Matrix-style falling digits pseudo-effect behind everything */
        .matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(180deg, rgba(0,0,0,1) 0%, rgba(10,25,10,0.9) 100%);
            z-index: -1;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            position: absolute;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,255,0,0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }
        
        @keyframes scanline {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }

        table { border-collapse: collapse; width: 100%; }
        
        thead { background: rgba(0, 50, 0, 0.8); border-bottom: 1px solid #0f0; }

        tr { border-bottom: 1px dashed rgba(0, 255, 0, 0.2); transition: all 0.3s ease; }
        
        /* Highlight new rows with a neon flash before settling */
        .new-row td {
            animation: flash-green 1s forwards;
        }

        @keyframes flash-green {
            0% { background-color: rgba(0, 255, 0, 0.8); color: black; }
            100% { background-color: transparent; color: #0f0; }
        }

        td, th { padding: 12px 16px; text-align: left; }
        
        .accent-blue { color: #0df; text-shadow: 0 0 5px #0df; }
        .accent-red { color: #f00; text-shadow: 0 0 5px #f00; }
        .text-glow { text-shadow: 0 0 5px #0f0; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #0f0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">
    
    <div class="matrix-bg"></div>
    <div class="scanline"></div>

    <div class="container mx-auto p-4 md:p-6">
        <div class="bg-black bg-opacity-50 border border-green-700 rounded-lg shadow-lg shadow-green-900/20 p-4 md:p-6 backdrop-blur-sm">
            <header class="flex justify-between items-center mb-4 border-b border-green-700 pb-3">
                <div>
                    <h1 class="text-4xl font-bold text-glow tracking-widest uppercase">
                        <i class="fa-solid fa-skull-crossbones mr-3"></i> Wall of Sheep
                    </h1>
                    <p class="text-sm mt-2 opacity-80 uppercase tracking-widest">
                        // Live Public Access Surveillance // Intercepted Traffic
                    </p>
                </div>
                <div class="text-right">
                    <span class="inline-block px-3 py-1 bg-green-900 bg-opacity-50 border border-green-500 rounded text-xs animate-pulse mb-2">
                        <i class="fa-solid fa-satellite-dish mr-2"></i>SNIFFING ACTIVE
                    </span>
                    <p id="connection-status" class="text-xs text-yellow-500">Connecting Server...</p>
                </div>
            </header>
            
            <div class="overflow-x-auto">
                <table id="traffic-table" class="w-full text-sm md:text-base font-mono">
                    <thead>
                        <tr>
                            <th class="p-2 md:p-3 text-left w-1/4">Timestamp</th>
                            <th class="p-2 md:p-3 text-left w-1/4">Source IP</th>
                            <th class="p-2 md:p-3 text-left w-1/2">Destination Host</th>
                        </tr>
                    </thead>
                    <tbody id="trafficTableBody">
                        <!-- Data will be injected here via WebSocket -->
                        <tr class="opacity-50">
                            <td colspan="3" class="text-center py-8 italic">// waiting for intercepted packets...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="w-full max-w-6xl mt-4 text-center text-xs opacity-50 uppercase pb-4">
        DEMONSTRATION ONLY - EDUCATIONAL PURPOSE - FREEMIUM AP CAPTIVE PORTAL
    </footer>

    <script>
        // Icons dictionary for known targets
        const knownTargets = {
            'google': '<i class="fa-brands fa-google ml-2 accent-blue"></i>',
            'facebook': '<i class="fa-brands fa-facebook ml-2 accent-blue"></i>',
            'instagram': '<i class="fa-brands fa-instagram ml-2 text-pink-500"></i>',
            'twitter': '<i class="fa-brands fa-twitter ml-2 accent-blue"></i>',
            'apple': '<i class="fa-brands fa-apple ml-2 text-white"></i>',
            'bank': '<i class="fa-solid fa-building-columns ml-2 accent-red"></i>',
            'chase': '<i class="fa-solid fa-building-columns ml-2 accent-red"></i>',
            'wellsfargo': '<i class="fa-solid fa-building-columns ml-2 accent-red"></i>',
            'whatsapp': '<i class="fa-brands fa-whatsapp ml-2 text-green-400"></i>',
            'tiktok': '<i class="fa-brands fa-tiktok ml-2 text-white"></i>',
            'snapchat': '<i class="fa-brands fa-tiktok ml-2 text-white"></i>',
            'netflix': '<i class="fa-brands fa-tiktok ml-2 text-red-500"></i>',
            'amazon': '<i class="fa-solid fa-tv ml-2 text-red-500"></i>',
            'youtube': '<i class="fa-brands fa-youtube ml-2 text-red-500"></i>'
        };

        function getIconForTarget(target) {
            const t = target.toLowerCase();
            for (let key in knownTargets) {
                if (t.includes(key)) {
                    return knownTargets[key];
                }
            }
            return '<i class="fa-solid fa-globe ml-2 text-gray-500"></i>';
        }

        function formatTime(isoString) {
            const d = new Date(isoString);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')} <span class="text-xs opacity-50">${d.getMilliseconds()}</span>`;
        }

        const tbody = document.getElementById('trafficTableBody');
        const statusEl = document.getElementById('connection-status');
        let isFirstRow = true;

        function connectWebSocket() {
            // Dynamically resolve WebSocket URI based on current hostname
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname || 'localhost';
            // Defaulting port to 8000 as per backend main.py
            const wsUri = `${protocol}//${host}:8000/ws/traffic`;
            
            const ws = new WebSocket(wsUri);

            ws.onopen = () => {
                statusEl.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 mr-1"></i> Connected via WS';
                statusEl.className = 'text-xs text-green-500 font-bold';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (isFirstRow) {
                        tbody.innerHTML = ''; // Clear the "waiting" row
                        isFirstRow = false;
                    }

                    const newRow = document.createElement('tr');
                    newRow.classList.add('new-row');

                    // Sanitize data before inserting into HTML
                    const sanitize = (str) => {
                        const temp = document.createElement('div');
                        temp.textContent = str;
                        return temp.innerHTML;
                    };

                    newRow.innerHTML = `
                        <td class="p-2 md:p-3 text-gray-400">${sanitize(data.timestamp)}</td>
                        <td class="p-2 md:p-3 text-yellow-400">${sanitize(data.src_ip)}</td>
                        <td class="p-2 md:p-3 text-cyan-400 break-all">${sanitize(data.dst_host)}</td>
                    `;
                    
                    tbody.prepend(newRow);

                    // Keep table from growing infinitely - Optional
                    if (tbody.children.length > 100) {
                        tbody.removeChild(tbody.lastChild);
                    }

                } catch (e) {
                    console.error("Error parsing WS message", e);
                }
            };

            ws.onclose = () => {
                statusEl.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 mr-1"></i> Disconnected. Reconnecting...';
                statusEl.className = 'text-xs text-red-500 font-bold animate-pulse';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error: ", err);
                ws.close();
            };
        }

        // Initialize connection
        connectWebSocket();

        /*
        // For testing UI without Python running, uncomment this block to generate fake traffic:
        setInterval(() => {
            const fakeDomains = ['api.instagram.com', 'mtalk.google.com', 'secure.chase.com', 'ads.tiktok.com', 'unknown-domain.net', 'apple.com'];
            const e = {
                data: JSON.stringify({
                    source_device_name: "iPhone_10.0.0.4",
                    target_domain: fakeDomains[Math.floor(Math.random() * fakeDomains.length)],
                    timestamp: new Date().toISOString()
                })
            };
            // Manually trigger the onmessage handler logic here if testing standalone
        }, 2000);
        */
        
    </script>
</body>
</html>
